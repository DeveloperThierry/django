<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} Title Here {% endblock %}</title>
    <link rel="stylesheet" href="{% static "css/style.css"%}">
  </head>
  <body>
    <nav>
      <a href="/"> <span role="img" aria-label="home">🏠</span> </a> | 
      <a href="/about"> <span role="img" aria-label="about">🏤</span></a> | 
      <a href="{% url "posts:posthome"%}"><span role="img" aria-label="posts">✉️</span></a> |
      <a href="{% url "users:usershome" %}"><span role="img" aria-label="users">👤</span></a> |
      <form class="logout" action="{% url "users:logout_user" %}" method="post">
        {% csrf_token %}
        <button class="logout-button" aria-label="logout">👋</button>
      </form>
    </nav>
    <main>{% block content%} {% endblock %}</main>
  </body>
</html>
